    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malawi Revenue Authority - Document Validation</title>
    <script>
        // Check if CAPTCHA was passed

            // Redirect to CAPTCHA if not passed
            window.location.href = "doc/v/captchaCode.html";
        }
    </script>
    <link href="doc/Content/css.css" rel="stylesheet"/>

        <h2>Document Validation System</h2>

        <p>Please click the button below to validate your document.</p>
        <button onclick="window.location.href='doc/v/captchaCode.html'">Validate Document</button>
        <hr />
        <footer>
            <p>&copy; 2026 - Malawi Revenue Authority</p>
        </footer>
    </div>

</html>
